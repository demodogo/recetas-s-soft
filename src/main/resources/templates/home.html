<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Gourmet Hub - Tus Recetas Favoritas</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--primary: #f97316;
				--primary-hover: #ea580c;
				--bg: #f8fafc;
				--text-main: #0f172a;
				--text-muted: #64748b;
				--card-bg: #ffffff;
				--shadow:
					0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: 'Plus Jakarta Sans', sans-serif;
				background-color: var(--bg);
				color: var(--text-main);
				line-height: 1.6;
				padding-bottom: 50px;
			}

			header {
				background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
				padding: 80px 20px;
				text-align: center;
				color: white;
				margin-bottom: 40px;
				box-shadow: var(--shadow);
			}

			header h1 {
				font-size: 3rem;
				font-weight: 800;
				margin-bottom: 10px;
				letter-spacing: -1px;
			}

			header p {
				font-size: 1.1rem;
				opacity: 0.9;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
				padding: 0 20px;
			}

			.recipe-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
				gap: 30px;
				margin-top: 20px;
			}

			.recipe-card {
				background: var(--card-bg);
				border-radius: 20px;
				overflow: hidden;
				box-shadow: var(--shadow);
				transition:
					transform 0.3s ease,
					box-shadow 0.3s ease;
				display: flex;
				flex-direction: column;
				border: 1px solid rgba(0, 0, 0, 0.05);
			}

			.recipe-card:hover {
				transform: translateY(-8px);
				box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
			}

			.recipe-content {
				padding: 25px;
				flex-grow: 1;
			}

			.recipe-card h2 {
				font-size: 1.4rem;
				font-weight: 700;
				margin-bottom: 12px;
				color: var(--text-main);
			}

			.recipe-card p {
				color: var(--text-muted);
				font-size: 0.95rem;
				margin-bottom: 20px;
				display: -webkit-box;
				-webkit-line-clamp: 3;
				-webkit-box-orient: vertical;
				overflow: hidden;
			}

			.btn-detail {
				display: inline-block;
				background-color: var(--primary);
				color: white;
				text-decoration: none;
				padding: 12px 24px;
				border-radius: 12px;
				font-weight: 600;
				transition: background-color 0.2s ease;
				text-align: center;
			}

			.btn-detail:hover {
				background-color: var(--primary-hover);
			}

			.empty-state {
				text-align: center;
				padding: 60px;
				background: white;
				border-radius: 20px;
				box-shadow: var(--shadow);
			}

			.badge {
				display: inline-block;
				background: #ffedd5;
				color: #9a3412;
				padding: 4px 12px;
				border-radius: 99px;
				font-size: 0.75rem;
				font-weight: 700;
				text-transform: uppercase;
				margin-bottom: 10px;
			}
		</style>
	</head>
	<body>
		<header>
			<div class="container">
				<h1>Libro de Recetas</h1>
				<p>Descubre sabores increíbles para cada ocasión</p>
			</div>
		</header>

		<main class="container">
			<div th:if="${recipes.isEmpty()}" class="empty-state">
				<p>Aún no hay recetas disponibles para mostrar.</p>
			</div>

			<div class="recipe-grid">
				<article class="recipe-card" th:each="recipe : ${recipes}">
					<div class="recipe-content">
						<span class="badge">Gourmet</span>
						<h2 th:text="${recipe.title}">Título de la Receta</h2>
						<p th:text="${recipe.description}">
							Aquí va la descripción corta de la receta que atrapa al lector...
						</p>
						<a th:href="@{/recetas/{id}(id=${recipe.id})}" class="btn-detail"
							>Ver Receta Completa</a
						>
					</div>
				</article>
			</div>
		</main>
	</body>
</html>
